name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Validate npm token
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is missing or empty"
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Validate tag and version sync
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          [ "$TAG_VERSION" = "$VERSION" ] || {
            echo "Tag/version mismatch: tag=$TAG_VERSION VERSION=$VERSION"
            exit 1
          }
      - name: Set package version
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          cd bindings/nodejs
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Build and publish
        run: |
          make -C core all
          cd bindings/nodejs
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Validate npm token
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is missing or empty"
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Validate tag and version sync
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [ "$TAG_VERSION" = "$VERSION" ] || {
              echo "Tag/version mismatch: tag=$TAG_VERSION VERSION=$VERSION"
              exit 1
            }
          fi
      - name: Set package version
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          cd cisv
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Check if version already exists on npm
        id: npm_exists
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          if npm view "cisv@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "cisv@${VERSION} already exists on npm, skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and publish
        if: steps.npm_exists.outputs.exists != 'true'
        run: |
          make -C core/core all
          cd cisv
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Resolve release tag
        id: rel
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true

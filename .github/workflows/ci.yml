name: CI

on:
  push:
  pull_request:

jobs:
  nodejs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: make -C core all
      - run: |
          cd bindings/nodejs
          npm ci
          npm run build
          npm test
